    <style>
  /* 画面全体を覆うロード画面 */
  #loading-overlay {
    position: fixed;
    display: block;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(255, 255, 255, 0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 99999;
  }

  /* くるくる（CSSスピナー） */
  .spinner {
    width: 100px;
    height: 100px;
    border: 6px solid #ccc;
    border-top-color: #3498db;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }      
    </style>
    <script type="module" crossorigin src="/typescratcherAssets/web/typescratcherAssets.js"></script>
  </head>
  <body>
    <div id="loading-overlay">
      <div class="spinner"></div>
    </div>
  </body>
